body:
  text: 陸機晉紀晉書限斷議三祖實終為臣故書為臣之事不可如傳此實録之謂也而名為帝王故自帝王之籍不可以不稱紀則追王之義初學記二十一文帝文帝勢崇于三分而身終乎北面雖曰未暇王業已固矣初學記九王濬之在巴郡也夢懸四刀于其壁上甚惡之濬問主簿李毅毅拜賀曰夫三刀為州而今見四刀為益一也明府其臨益州乎濬後果為益州刺史類聚六十又七十九書鈔一百二十三御覽二百五十四又三百四十五案此引作武紀
